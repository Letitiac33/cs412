<h2>Search / Filter</h2>

<form action="">
<table>
    <tr>
        <th>Party:</th>
        <td>
            <select name="party">
                <option value="">-- Any --</option>
                {% for p in parties %}
                <option value="{{ p }}" {% if selected_party == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
        </td>
    </tr>
    <tr>
        <th>Min Birth Year:</th>
        <td>
            <select name="min_dob">
                <option value="">-- Any --</option>
                {% for y in years %}
                <option value="{{ y }}" {% if selected_min_dob == y|stringformat:"s" %}selected{% endif %}>{{ y }}</option>
                {% endfor %}
            </select>
        </td>
    </tr>
    <tr>
        <th>Max Birth Year:</th>
        <td>
            <select name="max_dob">
                <option value="">-- Any --</option>
                {% for y in years %}
                <option value="{{ y }}" {% if selected_max_dob == y|stringformat:"s" %}selected{% endif %}>{{ y }}</option>
                {% endfor %}
            </select>
        </td>
    </tr>
    <tr>
        <th>Voter Score:</th>
        <td>
            <select name="voter_score">
                <option value="">-- Any --</option>
                {% for s in scores %}
                <option value="{{ s }}" {% if selected_voter_score == s|stringformat:"s" %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </td>
    </tr>
    <tr>
        <th>Voted in elections:</th>
        <td>
            <label><input type="checkbox" name="v20state" {% if selected_v20state %}checked{% endif %}> 2020 State</label>
            <label><input type="checkbox" name="v21town" {% if selected_v21town %}checked{% endif %}> 2021 Town</label>
            <label><input type="checkbox" name="v21primary" {% if selected_v21primary %}checked{% endif %}> 2021 Primary</label>
            <label><input type="checkbox" name="v22general" {% if selected_v22general %}checked{% endif %}> 2022 General</label>
            <label><input type="checkbox" name="v23town" {% if selected_v23town %}checked{% endif %}> 2023 Town</label>
        </td>
    </tr>
    <tr>
        <td><input type="submit" value="Submit"></td>
        <td><a href="">Clear</a></td>
    </tr>
</table>
</form>
