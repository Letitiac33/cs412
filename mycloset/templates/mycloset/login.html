<!-- Login form for the My Closet webapp -->
{% extends 'mycloset/base.html' %}

{% block content %}
<div class="form_card">
    <h2>Log In</h2>

    <form method="POST" action="{% url 'mycloset_login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{% url 'mycloset_closet' %}">
        {{ form.as_p }}
        <div class="form_buttons">
            <button type="submit">Log In</button>
            <a href="{% url 'mycloset_signup' %}"><button type="button">Sign Up</button></a>
        </div>
    </form>
</div>
{% endblock %}
