<!-- Form for uploading a new clothing item to the user's closet -->
{% extends 'mycloset/base.html' %}

{% block content %}
<h2>Add Clothing Item</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload</button>
    <a href="{% url 'mycloset_closet' %}">Cancel</a>
</form>
{% endblock %}
