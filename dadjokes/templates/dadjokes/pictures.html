{% extends 'dadjokes/base.html' %}
{% block content %}
<h1>All Pictures</h1>
{% for picture in pictures %}
    <div>
        <a href="/dadjokes/picture/{{ picture.pk }}">
            <img src="{{ picture.image_url }}" alt="Picture {{ picture.pk }}" style="max-width:300px;">
        </a>
    </div>
    <hr>
{% empty %}
    <p>No pictures yet.</p>
{% endfor %}
{% endblock %}
