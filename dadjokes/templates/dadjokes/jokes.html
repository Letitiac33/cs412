{% extends 'dadjokes/base.html' %}
{% block content %}
<h1>All Jokes</h1>
{% for joke in jokes %}
    <div>
        <p><a href="/dadjokes/joke/{{ joke.pk }}">{{ joke.text }}</a></p>
        <small>— {{ joke.contributor }}</small>
    </div>
    <hr>
{% empty %}
    <p>No jokes yet.</p>
{% endfor %}
{% endblock %}
